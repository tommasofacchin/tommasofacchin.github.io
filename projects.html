      const projectsGrid = document.getElementById("projects-grid");

      function createProjectCard(p) {
        const article = document.createElement("article");
        article.className = "project-card";
        article.dataset.stacks = p.stacks.join(",");

        const stacksHtml = p.stacks
          .map(
            (s) =>
              `<span class="tag-pill-stack" data-stack="${s}">${s}</span>`
          )
          .join("");

        article.innerHTML = `
          <div class="project-header">
            <div class="project-title-row">
              <h2 class="project-title">${p.title}</h2>
              <span class="project-meta">${p.metaMain}</span>
            </div>
          </div>
          <p class="project-description">
            ${p.description}
          </p>
          <div class="project-footer">
            <div class="project-stacks">
              ${stacksHtml}
            </div>
            <div class="project-actions">
              ${
                p.github
                  ? `<a href="${p.github}" target="_blank" class="btn-tertiary">
                       <i class="fa-brands fa-github"></i>
                       <span>View code</span>
                     </a>`
                  : ""
              }
            </div>
          </div>
        `;
        return article;
      }

      projectsData.sort((a, b) => {
        const dateA = parseMetaDate(a.metaMain);
        const dateB = parseMetaDate(b.metaMain);

        if (!dateA && !dateB) return 0;
        if (!dateA) return 1;   
        if (!dateB) return -1;

        return dateB - dateA;  
        });

        projectsData.forEach((p) => {
        projectsGrid.appendChild(createProjectCard(p));
        });

      const filterButtons = document.querySelectorAll("[data-stack-filter]");
      const projectCards = document.querySelectorAll(".project-card");
      const activeStacks = new Set();
      const countEl = document.getElementById("projects-count");
      const emptyEl = document.getElementById("projects-empty");
      const clearBtn = document.getElementById("projects-clear-filters");

      function updateFiltersUI() {
        filterButtons.forEach((btn) => {
          const stack = btn.dataset.stackFilter;
          if (activeStacks.has(stack)) {
            btn.classList.add("tag-pill-active");
          } else {
            btn.classList.remove("tag-pill-active");
          }
        });

        document.querySelectorAll(".tag-pill-stack").forEach((pill) => {
          const stack = pill.dataset.stack;
          pill.dataset.stackHighlight = activeStacks.has(stack)
            ? "true"
            : "false";
        });
      }

      function parseMetaDate(metaMain) {
        if (!metaMain) return null;

        const parts = metaMain.split(" ");
        if (parts.length >= 2) {
            const monthName = parts[0].toLowerCase();
            const year = parseInt(parts[1], 10);
            if (!year) return null;

            const monthMap = {
            jan: 0, 
            feb: 1, 
            mar: 2, 
            apr: 3, 
            may: 4,
            jun: 5, 
            jul: 6, 
            aug: 7, 
            sep: 8, 
            oct: 9, 
            nov: 10, 
            dec: 11,
            };

            const monthKey =
            monthName.slice(0, 3) in monthMap ? monthName.slice(0, 3) : monthName;
            const month = monthMap[monthKey];
            if (month === undefined) return new Date(year, 0, 1); 

            return new Date(year, month, 1);
        }

        const yearOnly = parseInt(metaMain, 10);
        if (yearOnly) return new Date(yearOnly, 0, 1);

        return null;
        }

      function updateCountAndEmpty() {
        const visible = [...projectCards].filter(
          (card) => card.style.display !== "none"
        ).length;
        const total = projectCards.length;
        countEl.textContent =
          activeStacks.size === 0
            ? `Showing ${total} projects`
            : `Showing ${visible} of ${total} projects`;
        emptyEl.style.display = visible === 0 ? "block" : "none";
      }

      function filterProjects() {
        if (activeStacks.size === 0) {
          projectCards.forEach((card) => {
            card.style.display = "";
          });
          updateCountAndEmpty();
          return;
        }

        projectCards.forEach((card) => {
          const stacks = (card.dataset.stacks || "")
            .split(",")
            .map((s) => s.trim())
            .filter(Boolean);

          const matches = [...activeStacks].some((s) => stacks.includes(s));
          card.style.display = matches ? "" : "none";
        });

        updateCountAndEmpty();
      }

      filterButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const stack = btn.dataset.stackFilter;
          if (activeStacks.has(stack)) {
            activeStacks.delete(stack);
          } else {
            activeStacks.add(stack);
          }
          updateFiltersUI();
          filterProjects();
        });
      });

      clearBtn.addEventListener("click", () => {
        activeStacks.clear();
        updateFiltersUI();
        filterProjects();
      });
      

      updateFiltersUI();
      updateCountAndEmpty();
